<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise!</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: #ffe4e8; 
            overflow-x: hidden; 
            cursor: pointer; 
        }

        /* --- INTRO PAGE --- */
        #intro-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background-color: #ffe4e8; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.8s ease; 
        }

        .open-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: 4px solid #fff; border-radius: 20px; padding: 25px 60px;
            color: #d84370; font-size: 2.2rem; font-weight: bold; font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(216, 67, 112, 0.3), inset 0 -5px 15px rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulseGlow 2s infinite;
        }

        .open-btn:hover {
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 20px 40px rgba(216, 67, 112, 0.5), inset 0 -5px 15px rgba(255,255,255,0.8);
            animation: shake 0.5s ease-in-out infinite alternate;
        }

        .intro-text { margin-top: 20px; font-family: 'Dancing Script', cursive; color: #d84370; font-size: 2rem; animation: fadeInPage 2s ease-in; }

        /* --- MAIN PAGE --- */
        #main-page {
            display: none; min-height: 100vh; width: 100%;
            justify-content: center; align-items: center; padding: 40px 20px; box-sizing: border-box;
            animation: fadeInPage 1s ease forwards; position: relative; overflow: hidden;
            perspective: 1500px; 
            background-color: #ffe4e8;
        }

        /* --- NEW: CINEMATIC BLURRED BACKGROUND --- */
        #bg-image {
            position: absolute;
            top: -5%; left: -5%; width: 110%; height: 110%; /* Made larger so blur doesn't show white edges */
            background-image: url('IMG_20260406_134706.jpg'); 
            background-size: cover; 
            background-position: center; 
            filter: blur(15px) brightness(0.95); /* Hides the doll, keeps the colors! */
            z-index: 1; /* Keeps it behind everything else */
            transition: background-position 0.2s ease-out;
            pointer-events: none;
        }

        /* --- 3D FLIP CARD LOGIC --- */
        .card-container {
            max-width: 500px; width: 100%;
            z-index: 20;
            transform-style: preserve-3d;
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Shared Glass Styles */
        .card-front, .card-back {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1)); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.8); border-left: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
            border-radius: 20px; text-align: center; box-sizing: border-box;
            backface-visibility: hidden; 
            overflow: hidden;
            position: relative;
        }

        .card-front {
            padding: 40px;
            animation: popInCard 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.2s; opacity: 0; 
        }

        .card-back {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 40px;
            transform: rotateY(180deg); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- GLASS CONTENT STYLING --- */
        h1 {
            font-family: 'Dancing Script', cursive;
            background: linear-gradient(45deg, #d84370, #ff9a9e, #d84370);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; font-size: 3.8rem; margin-top: 0; margin-bottom: 10px;
            filter: drop-shadow(2px 2px 2px rgba(255,255,255,0.8)); transform: translateZ(30px); 
        }

        .doll-image {
            width: 100%; max-width: 320px; border-radius: 15px; margin: 15px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); animation: floatDoll 3s ease-in-out infinite; 
            transform: translateZ(40px); transition: transform 0.3s ease;
        }
        .doll-image:hover { transform: translateZ(50px) scale(1.05); filter: brightness(1.1); }

        .message {
            color: #333; font-size: 1.15rem; line-height: 1.6; margin-bottom: 20px; font-weight: 700;
            text-shadow: 0px 0px 10px rgba(255,255,255,0.8); transform: translateZ(20px); min-height: 80px; 
        }
        .cursor { display: inline-block; width: 3px; height: 1.2rem; background-color: #d84370; animation: blink 0.7s infinite; vertical-align: middle; }

        #reveal-container { opacity: 0; transition: opacity 1s ease; transform: translateZ(20px); }

        .signature { font-weight: 700; color: #b05c73; font-size: 1.6rem; font-family: 'Dancing Script', cursive; margin: 0 0 15px 0; text-shadow: 1px 1px 0px #fff; }

        /* --- BUTTONS --- */
        .action-btn {
            background: linear-gradient(135deg, #fff0f3, #ffe4e8); border: 2px solid #ffb6c1;
            padding: 10px 20px; border-radius: 30px; color: #d84370; font-family: 'Quicksand', sans-serif;
            font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(216, 67, 112, 0.2);
            transition: all 0.2s ease; margin: 5px;
        }
        .action-btn:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(216, 67, 112, 0.4); background: #fff; }

        /* --- THE CAKE MODAL --- */
        #cake-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 228, 230, 0.7); backdrop-filter: blur(10px); z-index: 1000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .cake-modal-content {
            background: rgba(255, 255, 255, 0.85); padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 2px solid #fff; animation: popInCard 0.4s ease forwards;
        }
        #cakeCanvas { background: transparent; border-radius: 50%; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><text y="30" font-size="30">🔪</text></svg>') 0 30, crosshair; margin: 20px auto; display: block; touch-action: none; }
        .close-modal-btn { background: #d84370; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-family: 'Quicksand', sans-serif; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .close-modal-btn:hover { background: #ff9a9e; }

        /* --- EFFECTS --- */
        .decor { position: fixed; font-size: 3.5rem; z-index: 5; pointer-events: none; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); bottom: -10%; }
        .decor.left-1 { left: 5%; animation: flyUp 12s linear infinite 0s; }
        .decor.left-2 { left: 15%; animation: flyUp 15s linear infinite 4s; }
        .decor.left-3 { left: 8%; animation: flyUp 14s linear infinite 8s; }
        .decor.right-1 { right: 5%; animation: flyUp 13s linear infinite 2s; }
        .decor.right-2 { right: 15%; animation: flyUp 16s linear infinite 6s; }
        .decor.right-3 { right: 8%; animation: flyUp 11s linear infinite 9s; }

        .sparkle { position: fixed; pointer-events: none; z-index: 9999; width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #ff9a9e, 0 0 20px #d84370; animation: sparkleAnim 0.8s linear forwards; }
        .fairy-light { position: absolute; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,228,230,0.4) 50%, rgba(255,255,255,0) 100%); border-radius: 50%; z-index: 2; pointer-events: none; animation: drift 15s infinite ease-in-out alternate; }

        @media (max-width: 600px) {
            #main-page { padding: 20px 15px; } .card-front { padding: 30px 20px; } h1 { font-size: 2.8rem; } .doll-image { max-width: 240px; } .message { font-size: 1.05rem; } .open-btn { font-size: 1.6rem; padding: 20px 40px; } .decor { font-size: 2.2rem; } .decor.left-2, .decor.right-2 { display: none; } 
        }

        @keyframes popInCard { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes flyUp { 0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; } }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes sparkleAnim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes drift { 0% { transform: translate(0, 0) scale(1); opacity: 0.3; } 50% { opacity: 0.8; } 100% { transform: translate(100px, -100px) scale(1.5); opacity: 0.3; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 15px rgba(216, 67, 112, 0.4); } 50% { box-shadow: 0 0 35px rgba(216, 67, 112, 0.8); } 100% { box-shadow: 0 0 15px rgba(216, 67, 112, 0.4); } }
        @keyframes shake { 0% { transform: scale(1.1) rotate(0deg); } 25% { transform: scale(1.1) rotate(-3deg); } 50% { transform: scale(1.1) rotate(3deg); } 75% { transform: scale(1.1) rotate(-3deg); } 100% { transform: scale(1.1) rotate(0deg); } }
        @keyframes floatDoll { 0% { transform: translateY(0px) translateZ(40px); } 50% { transform: translateY(-12px) translateZ(40px); } 100% { transform: translateY(0px) translateZ(40px); } }
    </style>
</head>
<body>

    <audio id="bdayAudio" src="Blue.mp3" loop></audio>
    <audio id="cutSound" src="happy_birthday.mp3"></audio> 

    <div id="intro-page">
        <button class="open-btn" id="revealBtn">🎁 Open Gift!</button>
        <div class="intro-text">A special surprise is waiting...</div>
    </div>

    <div id="main-page">
        <div id="bg-image"></div>

        <div class="decor left-1">🎈</div><div class="decor left-2">🎂</div><div class="decor left-3">✨</div>
        <div class="decor right-1">🎂</div><div class="decor right-2">🎀</div><div class="decor right-3">🎈</div>
        <div id="lights-container"></div>

        <div class="card-container" id="cardContainer" data-tilt data-tilt-glare data-tilt-max-glare="0.2" data-tilt-scale="1.03" data-tilt-speed="400">
            <div class="card-inner">
                
                <div class="card-front">
                    <h1>Happy Birthday, <span id="bday-name">Minal</span>..</h1>
                    <img src="Gemini_Generated_Image_ic37e1ic37e1ic37.png" alt="Cute Dolls" class="doll-image">
                    <p class="message" id="typewriter-text"></p>
                    
                    <div id="reveal-container">
                        <p class="signature">With lots of care,<br>Abhishek</p>
                        <div>
                            <button class="action-btn" id="openCakeBtn">🎂 Cut the Cake!</button>
                            <button class="action-btn" onclick="flipCard()">Turn Over ⤵</button>
                        </div>
                    </div>
                </div>

                <div class="card-back">
                    <h2 style="font-family: 'Dancing Script', cursive; color: #d84370; font-size: 2.5rem; margin-top: 0;">A Secret Memory...</h2>
                    
                    <img src="min.jpg" alt="Secret Memory" class="doll-image" style="border: 4px solid white; border-radius: 5px;">
                    
                    <p class="message" style="margin-top: 15px;">
                        "Here is to making more beautiful memories together! Hope today is as special as you are."
                    </p>
                    <button class="action-btn" onclick="flipCard()" style="margin-top: 20px;">⤴ Flip Back</button>
                </div>

            </div>
        </div>
    </div>

    <div id="cake-modal">
        <div class="cake-modal-content">
            <h2 style="font-family: 'Dancing Script', cursive; color: #d84370; margin: 0; font-size: 2.5rem;">Make a wish!</h2>
            <canvas id="cakeCanvas" width="350" height="350"></canvas><br>
            <button class="close-modal-btn" id="closeCakeBtn">Done</button>
        </div>
    </div>

    <script>
        // DYNAMIC NAME
        const urlParams = new URLSearchParams(window.location.search);
        let customName = urlParams.get('name') || "Minal";
        document.getElementById('bday-name').textContent = customName;

        // FLIP CARD LOGIC
        function flipCard() {
            document.getElementById('cardContainer').classList.toggle('is-flipped');
        }

        // FAIRY LIGHTS
        const lightsContainer = document.getElementById('lights-container');
        for (let i = 0; i < 20; i++) {
            let light = document.createElement('div');
            light.classList.add('fairy-light');
            light.style.width = light.style.height = (Math.random() * 60 + 20) + 'px';
            light.style.left = Math.random() * 100 + 'vw';
            light.style.top = Math.random() * 100 + 'vh';
            light.style.animationDuration = (Math.random() * 10 + 10) + 's';
            light.style.animationDelay = (Math.random() * 5) + 's';
            lightsContainer.appendChild(light);
        }

        // TYPEWRITER
        const messageToType = "Wishing you a beautiful day filled with as much sweetness, joy, and love as you bring to everyone around you. May this year be your best one yet!";
        const messageElement = document.getElementById('typewriter-text');
        let index = 0;
        function typeWriter() {
            if (index < messageToType.length) {
                messageElement.innerHTML = messageToType.substring(0, index + 1) + '<span class="cursor"></span>';
                index++; setTimeout(typeWriter, 40); 
            } else {
                messageElement.innerHTML = messageToType;
                document.getElementById('reveal-container').style.opacity = "1";
            }
        }

        // INTRO REVEAL
        document.getElementById("revealBtn").addEventListener("click", function() {
            document.getElementById("bdayAudio").play().catch(e => console.log("Audio block:", e));
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#ff9a9e', '#fecfef', '#ffffff', '#d84370'] });
            document.getElementById("intro-page").style.opacity = "0";
            setTimeout(function() {
                document.getElementById("intro-page").style.display = "none";
                document.getElementById("main-page").style.display = "flex"; 
                setTimeout(typeWriter, 500); 
            }, 800);
        });

        // SPARKLE CURSOR
        function createSparkle(e) {
            const sparkle = document.createElement('div'); sparkle.classList.add('sparkle');
            let x = e.pageX || (e.touches && e.touches[0].pageX); let y = e.pageY || (e.touches && e.touches[0].pageY);
            sparkle.style.left = x + (Math.random() * 20 - 10) + 'px'; sparkle.style.top = y + (Math.random() * 20 - 10) + 'px';
            let size = Math.random() * 10 + 5; sparkle.style.width = size + 'px'; sparkle.style.height = size + 'px';
            document.body.appendChild(sparkle); setTimeout(() => { sparkle.remove(); }, 800);
        }
        document.addEventListener('mousemove', createSparkle); document.addEventListener('touchmove', createSparkle);

        // PARALLAX BG - NOW TARGETS THE NEW BLURRED DIV
        const bgImageLayer = document.getElementById('bg-image');
        document.addEventListener('mousemove', function(e) {
            let x = (e.clientX / window.innerWidth) * 100; let y = (e.clientY / window.innerHeight) * 100;
            if(bgImageLayer) bgImageLayer.style.backgroundPosition = `${100 - (x * 0.1)}% ${100 - (y * 0.1)}%`;
        });

        // BACKGROUND CLICK CONFETTI
        document.getElementById('main-page').addEventListener('click', function(e) {
            if(e.target.closest('.card-container') || e.target.closest('#revealBtn') || e.target.closest('#cake-modal')) return;
            confetti({ particleCount: 40, spread: 50, origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight }, colors: ['#ff9a9e', '#fecfef', '#ffffff'] });
        });

        // ANIMATED CAKE LOGIC
        const cakeModal = document.getElementById('cake-modal');
        const openCakeBtn = document.getElementById('openCakeBtn');
        const closeCakeBtn = document.getElementById('closeCakeBtn');
        const canvas = document.getElementById('cakeCanvas');
        const ctx = canvas.getContext('2d');
        const cutSound = document.getElementById('cutSound');
        const bgAudio = document.getElementById('bdayAudio'); 
        const centerX = 175; const centerY = 175; const cakeRadius = 110;
        let removedSlices = []; let flyingSlices = []; let animationFrameId;

        // OPEN CAKE MODAL
        openCakeBtn.addEventListener('click', () => { 
            cakeModal.style.display = 'flex'; 
            removedSlices = []; 
            flyingSlices = []; 
            startCakeAnimation(); 
            
            // PAUSE BACKGROUND MUSIC
            bgAudio.pause();
        });

        // CLOSE CAKE MODAL
        closeCakeBtn.addEventListener('click', () => { 
            cakeModal.style.display = 'none'; 
            cancelAnimationFrame(animationFrameId); 
            
            // STOP HAPPY BIRTHDAY MUSIC
            cutSound.pause();
            cutSound.currentTime = 0;

            // RESUME BACKGROUND MUSIC
            bgAudio.play().catch(e => console.log("Audio resume error:", e));
        });

        function startCakeAnimation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Plate
            ctx.beginPath(); ctx.arc(centerX, centerY, cakeRadius + 20, 0, Math.PI * 2); ctx.fillStyle = '#fdfaf5'; ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = '#e6d8cd'; ctx.stroke();

            // Cake Body
            ctx.beginPath(); ctx.arc(centerX, centerY, cakeRadius, 0, Math.PI * 2); ctx.fillStyle = '#ffb6c1'; ctx.fill();

            // Border
            ctx.beginPath(); ctx.arc(centerX, centerY, cakeRadius - 10, 0, Math.PI * 2); ctx.lineWidth = 15;
            ctx.strokeStyle = '#fff0f3'; ctx.setLineDash([12, 15]); ctx.stroke(); ctx.setLineDash([]); 

            // Text
            ctx.save(); ctx.translate(centerX, centerY); ctx.fillStyle = "#d84370"; ctx.font = "bold 26px 'Dancing Script'";
            ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.shadowColor = "rgba(255,255,255,0.8)"; ctx.shadowBlur = 4;
            let displayName = customName.length > 8 ? customName.substring(0,8) + "..." : customName;
            ctx.fillText(displayName, 0, 15); ctx.restore();

            // Removed Slices
            ctx.fillStyle = '#fdfaf5'; 
            removedSlices.forEach(slice => {
                ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.arc(centerX, centerY, cakeRadius + 2, slice.start, slice.end); ctx.fill();
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(slice.start) * cakeRadius, centerY + Math.sin(slice.start) * cakeRadius);
                ctx.lineTo(centerX + Math.cos(slice.end) * cakeRadius, centerY + Math.sin(slice.end) * cakeRadius);
                ctx.lineTo(centerX, centerY); ctx.fillStyle = '#ffe4e8'; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#ffb6c1'; ctx.stroke();
            });

            // Flying Slices
            for (let i = flyingSlices.length - 1; i >= 0; i--) {
                let fs = flyingSlices[i];
                fs.distance += 2; fs.scale += 0.01; fs.opacity -= 0.02; 
                if (fs.opacity <= 0) { flyingSlices.splice(i, 1); continue; }

                ctx.save();
                ctx.translate(centerX + Math.cos(fs.midAngle) * fs.distance, centerY + Math.sin(fs.midAngle) * fs.distance);
                ctx.scale(fs.scale, fs.scale); ctx.globalAlpha = fs.opacity;

                ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, cakeRadius, fs.start - fs.midAngle, fs.end - fs.midAngle);
                ctx.fillStyle = '#ffb6c1'; ctx.fill(); ctx.strokeStyle = '#ffe4e8'; ctx.lineWidth = 3; ctx.stroke();
                ctx.restore();
            }
            animationFrameId = requestAnimationFrame(startCakeAnimation);
        }

        function handleCakeCut(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX || (e.touches && e.touches[0].clientX); let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const x = clientX - rect.left; const y = clientY - rect.top;

            if (Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2)) <= cakeRadius) {
                cutSound.currentTime = 0; cutSound.play().catch(e => console.log("Sound error"));

                const clickAngle = Math.atan2(y - centerY, x - centerX);
                const sliceWidth = Math.PI / 6; 
                const startAngle = clickAngle - (sliceWidth/2); const endAngle = clickAngle + (sliceWidth/2);

                removedSlices.push({ start: startAngle, end: endAngle });
                flyingSlices.push({ start: startAngle, end: endAngle, midAngle: clickAngle, distance: 0, scale: 1, opacity: 1 });

                confetti({ particleCount: 40, spread: 60, origin: { x: clientX / window.innerWidth, y: clientY / window.innerHeight }, colors: ['#fff', '#ff9a9e', '#d84370'] });
            }
        }

        canvas.addEventListener('mousedown', handleCakeCut);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleCakeCut(e); }, {passive: false});

    </script>

</body>
</html>
